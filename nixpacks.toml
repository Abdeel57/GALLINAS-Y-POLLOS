[variables]
    NIXPACKS_NODE_VERSION = "22.13.1"

[phases.install]
    cmds = ["npm install", "cd backend && npm install"]

[phases.build]
    cmds = ["npm run build", "cd backend && npx prisma generate && npm run build"]

[start]
    cmd = "cd backend && npx prisma@5.22.0 migrate deploy && node dist/index.js"
